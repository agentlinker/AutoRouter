<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoRouter Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="layout">
      <section id="auth-view" class="auth-view">
        <div class="brand">
          <div class="brand-mark">AR</div>
          <div>
            <h1>AutoRouter Admin</h1>
            <p>管理本地 provider、密钥与自动发现的模型。</p>
          </div>
        </div>

        <div class="auth-card">
          <div class="card-header">
            <h2>管理员验证</h2>
            <p>使用 `.env` 中的 `AUTO_ROUTER_ADMIN_TOKEN` 进入控制台。</p>
          </div>

          <label class="field">
            <span>Admin Token</span>
            <input
              id="admin-token"
              type="password"
              placeholder="输入 admin token"
              autocomplete="current-password"
            />
          </label>

          <button id="save-token" class="primary-action" type="button">进入管理台</button>
          <p id="auth-status" class="status">等待验证</p>
        </div>
      </section>

      <section id="provider-management" class="app-view" hidden>
        <header class="topbar">
          <div class="brand compact">
            <div class="brand-mark">AR</div>
            <div>
              <h1>Provider 管理</h1>
              <p>配置 OpenAI-compatible provider 并同步模型。</p>
            </div>
          </div>
          <div class="topbar-actions">
            <span id="session-status" class="badge success">已验证</span>
            <button id="lock-console" class="ghost-action" type="button">锁定</button>
          </div>
        </header>

        <section class="content-grid">
          <aside class="panel create-panel">
            <div class="card-header">
              <h2 id="provider-form-title">新增 Provider</h2>
              <p id="provider-form-help">填写服务信息后，系统会自动找到可用模型并保存起来。</p>
            </div>

            <form id="provider-form" class="form">
              <label class="field">
                <span class="required-label">Provider Key</span>
                <input name="provider_key" placeholder="my-provider" required />
              </label>
              <label class="field">
                <span class="required-label">Display Name</span>
                <input name="display_name" placeholder="My Provider" required />
              </label>
              <label class="field">
                <span class="required-label">Base URL</span>
                <input name="base_url" placeholder="https://example.com/v1" required />
              </label>
              <label class="field">
                <span>官网地址</span>
                <input name="website_url" placeholder="https://example.com" />
              </label>
              <label class="field">
                <span id="api-key-label" class="required-label">API Key</span>
                <input name="api_key" type="password" placeholder="sk-..." required />
              </label>
              <div class="form-actions">
                <button id="submit-provider" class="primary-action" type="submit">保存并同步</button>
                <button id="cancel-edit" class="ghost-action" type="button" hidden>取消编辑</button>
              </div>
            </form>

            <p id="form-status" class="status"></p>
          </aside>

          <section class="panel list-panel">
            <div class="list-header">
              <div>
                <h2>Provider 列表</h2>
                <p id="provider-summary" class="muted">正在加载 provider</p>
              </div>
              <button id="refresh-providers" class="ghost-action" type="button">刷新</button>
            </div>

            <div id="providers" class="provider-list"></div>
          </section>
        </section>
      </section>
    </main>

    <script src="/admin/admin.js" type="module"></script>
  </body>
</html>
