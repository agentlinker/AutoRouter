server:
  host: 127.0.0.1
  port: 8811
  request_timeout_ms: 120000
  gateway_token_env: AUTO_ROUTER_TOKEN
  admin_token_env: AUTO_ROUTER_ADMIN_TOKEN

database:
  path: ./data/autorouter.db

defaults:
  model: auto
  policy: balanced
  privacy_level: normal

trace:
  directory: ./data/traces
  log_prompts: false

providers:
  openrouter:
    display_name: OpenRouter
    trust_level: medium
    privacy_level: normal
    usage_trust: medium
    protocol: openai
    adapter: openrouter
    base_url: https://openrouter.ai/api/v1
    capabilities:
      streaming: true
      tools: true
      json_mode: true
    accounts:
      - id: main
        credential_env: OPENROUTER_API_KEY
    models:
      - id: sonnet
        model_name: anthropic/claude-sonnet-4
        context_window: 200000
        capabilities:
          streaming: true
          tools: true
          json_mode: true
        pricing:
          input_per_1m: 3
          output_per_1m: 15
          source: openrouter
          confidence: medium

  relay-a:
    display_name: Relay A
    trust_level: low
    privacy_level: public_only
    usage_trust: low
    protocol: openai
    adapter: openai_compatible
    base_url: https://relay-a.example.com/v1
    capabilities:
      streaming: true
      tools: true
      json_mode: true
    accounts:
      - id: main
        credential_env: RELAY_A_API_KEY
        quota:
          monthly_usd_limit: 5
    models:
      - id: deepseek
        model_name: deepseek-chat
        context_window: 64000
        capabilities:
          streaming: true
          tools: true
          json_mode: true
        pricing:
          input_per_1m: 0.5
          output_per_1m: 1.5
          source: manual
          confidence: low

  anthropic-direct:
    display_name: Anthropic Direct
    trust_level: high
    privacy_level: normal
    usage_trust: high
    protocol: anthropic
    adapter: anthropic
    base_url: https://api.anthropic.com/v1
    capabilities:
      streaming: true
      tools: true
      json_mode: false
    accounts:
      - id: main
        credential_env: ANTHROPIC_API_KEY
    models:
      - id: sonnet
        model_name: claude-sonnet-4-20250514
        context_window: 200000
        capabilities:
          streaming: true
          tools: true
          json_mode: false
        pricing:
          input_per_1m: 3
          output_per_1m: 15
          source: official
          confidence: high

  local-ollama:
    display_name: Local Ollama
    trust_level: high
    privacy_level: private
    usage_trust: high
    protocol: openai
    adapter: ollama
    base_url: http://127.0.0.1:11434
    capabilities:
      streaming: true
      tools: false
      json_mode: false
    accounts:
      - id: local
        account_type: local_model
    models:
      - id: qwen-local
        model_name: qwen2.5-coder:32b
        context_window: 32000
        capabilities:
          streaming: true
          tools: false
          json_mode: false

routes:
  auto:
    policy: balanced
    candidates:
      - provider: openrouter
        account: main
        model: sonnet
      - provider: relay-a
        account: main
        model: deepseek
      - provider: anthropic-direct
        account: main
        model: sonnet
      - provider: local-ollama
        account: local
        model: qwen-local
